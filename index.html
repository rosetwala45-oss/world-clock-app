<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="icons8-clock-96 (1).png" type="image/png" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>

    <link rel="stylesheet" href="styles.css" />
    <title>World Clock App</title>
  </head>
  <body>
    <div class="container">
      <h1>🌍 World Clock</h1>

      <select id="city">
        <option value=" ">Select a city...</option>
        <option value="current">Your current location</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="Europe/London">London</option>
        <option value="America/New_York">New York</option>
      </select>

      <div id="cities">
        <div class="city" id="los-angeles">
          <div>
            <h2>Los Angeles</h2>
            <div class="date"></div>
          </div>
          <div class="time"><small>PM</small></div>
        </div>
        <div class="city" id="london">
          <div>
            <h2>London</h2>
            <div class="date"></div>
          </div>
          <div class="time"><small>PM</small></div>
        </div>
        <div class="city" id="new-york">
          <div>
            <h2>New York</h2>
            <div class="date"></div>
          </div>
          <div class="time"><small>PM</small></div>
        </div>
      </div>
    </div>
    <footer>
      <p>
        This project was coded with 🩷 by <strong>Mbali Twala</strong> and is
        <a href="https://github.com/rosetwala45-oss/world-clock-app" target="_blank"
          >open sourced on GitHub</a
        >
      </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
