<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="icons8-clock-96 (1).png" type="image/png" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.jss"></script>

    <link rel="stylesheet" href="styles.css" />
    <title>World Clock App</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>World Clock</h1>
      </header>
      <main>
        <select id="city">
          <option value=" ">Select a city...</option>
          <option value="current">Your current location</option>
          <option value="Europe/London">London</option>
          <option value="America/New_York">New York</option>
          <option value="Pacific/Auckland">Auckland</option>
        </select>
        <div id="cities">
          <div class="city" id="los-angeles">
            <div>
              <h2>Los Angeles</h2>
              <div class="date"></div>
            </div>
            <div class="time"><small>PM</small></div>
          </div>
          <div class="city" id="london">
            <div>
              <h2>London</h2>
              <div class="date"></div>
            </div>
            <div class="time"><small>PM</small></div>
          </div>
          <div class="city" id="paris">
            <div>
              <h2>Paris</h2>
              <div class="date"></div>
            </div>
            <div class="time"><small>PM</small></div>
          </div>
        </div>
      </main>
    </div>
    <footer>
      <p>
        This project was coded with 🩷 by <strong>Mbali Twala</strong> and is
        <a href="#">open sourced on GitHub</a>
      </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
